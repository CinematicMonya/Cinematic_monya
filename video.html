<!DOCTYPE html>
<html>
<head>

<title>Cinematic Monyaa Video</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:1000px;
text-align:center;
}

h1{
color:red;
font-size:38px;
margin-bottom:10px;
}

p{
font-size:18px;
color:#ccc;
margin-bottom:20px;
}

/* Video */

iframe{
display:block;
margin:auto;
width:100%;
max-width:420px;
aspect-ratio:9/16;
height:80vh;
border:none;
border-radius:20px;
box-shadow:0 0 30px red;
background:#000;
}

.download-btn{
display:inline-block;
margin-top:25px;
padding:15px 35px;
background:red;
color:white;
text-decoration:none;
font-size:20px;
font-weight:bold;
border-radius:12px;
transition:.3s;
}

.download-btn:hover{
background:#ff3333;
transform:scale(1.05);
}

@media(max-width:768px){

iframe{
width:100%;
max-width:400px;
height:75vh;
}

h1{
font-size:28px;
}

p{
font-size:16px;
}

.download-btn{
font-size:18px;
padding:12px 28px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>🎬 Cinematic Monyaa</h1>

<p>Your Premium Cinematic Video</p>

<iframe
src="https://drive.google.com/file/d/1B5ee5VFjCh8IShGNKUIzPYicIJFI9PAs/preview"
allow="autoplay">
</iframe>

<br><br>

<a class="download-btn"
href="https://drive.google.com/uc?export=download&id=1B5ee5VFjCh8IShGNKUIzPYicIJFI9PAs">
⬇ Download Video
</a>

</div>

</body>
</html>
