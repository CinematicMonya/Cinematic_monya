<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Monyaa</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:#fff;
}

.container{
width:100%;
max-width:430px;
text-align:center;
}

h1{
color:#ff0000;
font-size:34px;
margin-bottom:8px;
}

p{
color:#aaa;
margin-bottom:20px;
}

.video-box{
width:100%;
aspect-ratio:9/16;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 25px red;
background:#111;
}

.video-box iframe{
width:100%;
height:100%;
border:none;
}

.download-btn{
display:block;
margin:25px auto 0;
width:220px;
padding:15px;
background:#ff0000;
color:#fff;
text-decoration:none;
font-weight:bold;
border-radius:12px;
transition:.3s;
}

.download-btn:hover{
background:#cc0000;
}
</style>

</head>
<body>

<div class="container">

<h1>🎬 Cinematic Monyaa</h1>
<p>Your Premium Cinematic Video</p>

<div class="video-box">
<iframe
src="https://drive.google.com/file/d/1B5ee5VFjCh8IShGNKUIzPYicIJFI9PAs/preview"
allow="autoplay; fullscreen">
</iframe>
</div>

<a class="download-btn"
href="https://drive.google.com/uc?export=download&id=1B5ee5VFjCh8IShGNKUIzPYicIJFI9PAs">
⬇ Download Video
</a>

</div>

</body>
</html>
