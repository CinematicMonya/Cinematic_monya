<!DOCTYPE html>
<html>
<head>
<title>Premium Cinematic Video</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.logo{
position:absolute;
top:25px;
left:50%;
transform:translateX(-50%);
font-size:42px;
font-weight:700;
color:#FFD700;
}

.box{
background:#111;
padding:45px;
border-radius:35px;
border:3px solid #FFD700;
max-width:850px;
width:95%;
text-align:center;
box-shadow:0 0 25px rgba(255,215,0,0.3);
}

h1{
font-size:42px;
color:#FFD700;
margin-bottom:30px;
}

video{
width:100%;
border-radius:25px;
border:2px solid #FFD700;
}

.btn{
display:inline-block;
margin-top:30px;
padding:16px 55px;
background:#FFD700;
color:#000;
border-radius:50px;
text-decoration:none;
font-size:22px;
font-weight:bold;
}

.btn:hover{
background:white;
}

.footer{
margin-top:30px;
font-size:18px;
color:#aaa;
}

</style>

</head>

<body>

<div class="logo">👑 Premium Cinematic</div>

<div class="box">

<h1>🎬 Your Cinematic Video</h1>

<video controls>
<source src="video.mp4" type="video/mp4">
</video>

<a class="btn" href="video.mp4" download>
⬇️ Download Video
</a>

<p class="footer">
Thank You For Choosing Premium Cinematic ❤️
</p>

</div>

</body>
</html>
