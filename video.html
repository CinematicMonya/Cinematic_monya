<!DOCTYPE html>
<html>
<head>

<title>Cinematic Monyaa Video</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:1000px;
text-align:center;
}

h1{
color:red;
font-size:38px;
margin-bottom:10px;
}

p{
font-size:18px;
color:#ccc;
margin-bottom:20px;
}

video{
width:100%;
max-width:900px;
border-radius:20px;
box-shadow:0 0 30px red;
background:#000;
}

.download-btn{
display:inline-block;
margin-top:25px;
padding:15px 35px;
background:red;
color:white;
text-decoration:none;
font-size:20px;
font-weight:bold;
border-radius:12px;
transition:.3s;
}

.download-btn:hover{
background:#ff3333;
transform:scale(1.05);
}

@media(max-width:768px){

video{
width:100%;
}

h1{
font-size:28px;
}

.download-btn{
font-size:18px;
padding:12px 28px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>🎬 Cinematic Monyaa</h1>

<p>Your Premium Cinematic Video</p>

<video controls>
<source src="video.mp4" type="video/mp4">
Your browser does not support the video tag.
</video>

<br><br>

<a class="download-btn" href="video.mp4" download>
⬇ Download Video
</a>

</div>

</body>
</html>
