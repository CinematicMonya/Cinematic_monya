<!DOCTYPE html>
<html>

<head>

<title>Unlock Your Video</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}


.box{

width:95%;
max-width:600px;
background:#111;
padding:45px;
border-radius:30px;
text-align:center;
box-shadow:0 0 40px red;

}


.abhinandan{

font-size:55px;
font-weight:bold;
color:red;
text-align:center;
margin-bottom:30px;

}


h2{

font-size:32px;
text-align:center;
margin-bottom:20px;

}


p{

font-size:20px;
text-align:center;
line-height:1.6;

}


input{

margin-top:30px;
width:90%;
padding:18px;
border-radius:50px;
border:none;
font-size:20px;
text-align:center;

}


button{

margin-top:30px;
padding:18px 45px;
border:none;
border-radius:50px;
background:red;
color:white;
font-size:22px;
font-weight:bold;

}


#error{

color:red;
margin-top:20px;
font-size:18px;

}

</style>

</head>


<body>


<div class="box">


<div class="abhinandan">
अभिनंदन 🎉
</div>


<h2>
Unlock Your Video
</h2>


<p>
WhatsApp वर मिळालेला Password टाका
</p>


<input type="password" id="password" placeholder="Enter Password">


<button onclick="unlockVideo()">
Unlock Your Video
</button>


<div id="error"></div>


</div>



<script>

function unlockVideo(){

let pass = document.getElementById("password").value;

if(pass=="99"){

window.location.href="success.html";

}
else{

document.getElementById("error").innerHTML="Wrong Password";

}

}

</script>


</body>

</html>
