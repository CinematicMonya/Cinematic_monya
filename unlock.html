<!DOCTYPE html>
<html>
<head>
<title>Premium Cinematic Unlock</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

.logo{

width:95%;

box-shadow:0 0 25px rgba(255,215,0,0.3);
}

h1{
color:#FFD700;
font-size:45px;
margin-bottom:30px;
}

p{
font-size:25px;
line-height:1.8;
margin-bottom:30px;
}

input{
width:100%;
height:70px;
border-radius:25px;
border:3px solid #FFD700;
background:#000;
color:white;
font-size:25px;
text-align:center;
padding:15px;
}

input::placeholder{
color:#aaa;
}

.btn{
display:inline-block;
margin-top:35px;
padding:18px 60px;
background:#222;
color:white;
border:2px solid #FFD700;
border-radius:50px;
text-decoration:none;
font-size:24px;
font-weight:bold;
}

.btn:hover{

}

</style>

</head>

<body>

<div class="logo">👑 Premium Cinematic</div>

</a>
