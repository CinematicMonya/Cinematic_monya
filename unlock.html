<!DOCTYPE html>
<html>
<head>
<title>Premium Cinematic Unlock</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.logo{
position:absolute;
top:25px;
left:50%;
transform:translateX(-50%);
font-size:42px;
font-weight:700;
color:#FFD700;
}

.box{
background:#111;
padding:55px 45px;
border-radius:35px;
border:3px solid #FFD700;
max-width:750px;
width:95%;
text-align:center;
box-shadow:0 0 25px rgba(255,215,0,0.3);
}

h1{
color:#FFD700;
font-size:45px;
margin-bottom:30px;
}

p{
font-size:22px;
margin-bottom:25px;
}

input{
width:100%;
height:65px;
border-radius:25px;
border:3px solid #FFD700;
background:#000;
color:white;
font-size:22px;
text-align:center;
outline:none;
}

.btn{
margin-top:30px;
padding:18px 60px;
background:linear-gradient(45deg,#00C853,#FFD700,#FF0000);
color:#fff;
border:0;
border-radius:50px;
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:.3s;
box-shadow:0 0 20px rgba(255,215,0,0.5);
}

.btn:hover{
background:linear-gradient(45deg,#FF0000,#FFD700,#00C853);
transform:scale(1.05);
}

#error{
color:red;
margin-top:20px;
display:none;
font-size:20px;
}

</style>

</head>

<body>

<div class="logo">👑 Premium Cinematic</div>

<div class="box">

<h1>🔐 Video Unlock</h1>

<p>तुमचा Password टाका</p>

<input id="password" type="password" placeholder="Enter Password">

<br>

<button class="btn" onclick="checkPassword()">
🔐 Unlock Your Video
</button>

<p id="error">
Wrong Password ❌
</p>

</div>


<script>

function checkPassword(){

let pass=document.getElementById("password").value;

if(pass==="Free"){

window.location.href="success.html";

}

else{

document.getElementById("error").style.display="block";

}

}

</script>

</body>
</html>
