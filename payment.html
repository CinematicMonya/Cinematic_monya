<!DOCTYPE html>
<html>

<head>

<title>Premium Cinematic Payment</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}


.main-box{

width:95%;
max-width:700px;
background:#111;
padding:35px;
border-radius:30px;
box-shadow:0 0 40px red;
text-align:center;

}


.logo{

font-size:32px;
font-weight:bold;
margin-bottom:25px;

}


h1{

color:red;
font-size:42px;
margin-bottom:25px;

}


.card{

background:#1b1b1b;
padding:25px;
border-radius:25px;
margin:20px 0;
border:1px solid #333;

}


.card h2{

font-size:24px;
color:red;
margin-bottom:15px;

}


.card p{

font-size:28px;
font-weight:bold;

}


.qr-box{

background:white;
padding:20px;
border-radius:25px;
display:inline-block;

}


.qr-box img{

width:380px;
height:380px;
object-fit:contain;

}


button{

width:90%;
padding:18px;
margin-top:20px;
border:none;
border-radius:50px;
background:red;
color:white;
font-size:22px;
font-weight:bold;

}


.download{

background:#222;
border:2px solid red;

}

</style>

</head>


<body>


<div class="main-box">


<div class="logo">
CINEMATIC MONYAA
</div>


<h1>
Payment
</h1>


<div class="card">

<h2>
Customer Name
</h2>

<p>
Rahul
</p>

</div>


<div class="card">

<h2>
Amount
</h2>

<p>
₹999
</p>

</div>


<div class="card">

<h2>
Scan QR Code
</h2>

<div class="qr-box">

<img id="qrImage" src="IMG_4153.jpeg">

</div>

</div>


<button class="download" onclick="downloadQR()">
Download QR
</button>


<button onclick="location.href='unlock.html'">
Payment Done
</button>


</div>



<script>

function downloadQR(){

let image=document.getElementById("qrImage").src;

let link=document.createElement("a");

link.href=image;

link.download="Payment_QR.jpeg";

link.click();

}

</script>


</body>

</html>
