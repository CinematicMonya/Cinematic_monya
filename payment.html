<!DOCTYPE html>
<html>

<head>

<title>Premium Cinematic Payment</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#000;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

}


.box{

width:95%;
max-width:650px;
background:#111;
padding:35px;
border-radius:30px;
text-align:center;
box-shadow:0 0 40px red;

}


.logo{

font-size:32px;
font-weight:bold;
margin-bottom:20px;

}


h1{

color:red;
font-size:40px;
margin-bottom:25px;

}


.info-box{

width:100%;
height:70px;
background:#1b1b1b;
border-radius:20px;
border:1px solid #333;
margin:15px 0;

display:flex;
align-items:center;
justify-content:center;

font-size:24px;
font-weight:bold;

}


/* QR PERFECT FIT */

.qr-box{

width:360px;
height:360px;

background:white;
border-radius:20px;

overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

margin:25px auto;

}


.qr-box img{

width:100%;
height:105%;

object-fit:cover;

}


button{

width:90%;
padding:16px;

margin-top:18px;

border:none;
border-radius:50px;

background:red;

color:white;

font-size:22px;
font-weight:bold;

}


.download{

background:#222;
border:2px solid red;

}


@media(max-width:600px){

.qr-box{

width:300px;
height:300px;

}

}

</style>

</head>


<body>


<div class="box">


<div class="logo">
CINEMATIC MONYAA
</div>


<h1>
Payment
</h1>


<div class="info-box">
premium_dry_cleners
</div>


<div class="info-box">
100
</div>


<div class="qr-box">

<img id="qrImage" src="IMG_4153.jpeg">

</div>


<button class="download" onclick="downloadQR()">
Download QR
</button>


<button onclick="location.href='unlock.html'">
Payment Done
</button>


</div>



<script>

function downloadQR(){

let image=document.getElementById("qrImage").src;

let link=document.createElement("a");

link.href=image;

link.download="Payment_QR.jpeg";

link.click();

}

</script>


</body>

</html>
