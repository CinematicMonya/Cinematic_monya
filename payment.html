<!DOCTYPE html>
<html>

<head>

<title>Unlock Your Video</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#000;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

}


.box{

width:95%;
max-width:600px;
background:#111;
padding:45px;
border-radius:30px;
text-align:center;
box-shadow:0 0 40px red;

}


h1{

font-size:45px;
color:red;
margin-bottom:25px;

}


p{

font-size:22px;
line-height:1.6;

}


input{

margin-top:35px;
width:90%;
padding:18px;
border-radius:50px;
border:none;
font-size:20px;
text-align:center;

}


button{

margin-top:30px;
padding:18px 45px;
border:none;
border-radius:50px;
background:red;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;

}


#error{

margin-top:20px;
color:red;
font-size:20px;

}


</style>

</head>


<body>


<div class="box">


<h1>
Unlock Your Video
</h1>


<p>
WhatsApp वर मिळालेला Password टाका
</p>


<input 
type="password" 
id="password" 
placeholder="Enter Password">


<button onclick="unlockVideo()">
Unlock Your Video
</button>


<div id="error"></div>


</div>



<script>

function unlockVideo(){

let pass = document.getElementById("password").value;


if(pass=="1234"){

window.location.href="success.html";

}

else{

document.getElementById("error").innerHTML="Wrong Password!";

}

}

</script>


</body>

</html>
