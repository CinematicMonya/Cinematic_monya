<!DOCTYPE html>
<html>

<head>

<title>Premium Cinematic Payment</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#000;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

}


.box{

width:95%;
max-width:650px;
background:#111;
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 0 40px red;

}


.logo{

font-size:32px;
font-weight:bold;
margin-bottom:25px;

}


h1{

color:red;
font-size:40px;
margin-bottom:25px;

}


.name{

font-size:28px;
font-weight:bold;
margin-bottom:20px;

}


.amount{

font-size:35px;
color:#fff;
font-weight:bold;
margin-bottom:25px;

}


.qr{

width:320px;
height:320px;
background:white;
padding:15px;
border-radius:25px;
margin:20px auto;

}


.qr img{

width:100%;
height:100%;
object-fit:contain;

}


button{

display:block;
width:90%;
margin:20px auto 0;
padding:18px;
border:none;
border-radius:50px;
font-size:22px;
font-weight:bold;
background:red;
color:white;

}


.download{

background:#222;
border:2px solid red;

}


</style>

</head>


<body>


<div class="box">


<div class="logo">
CINEMATIC MONYAA
</div>


<h1>
Payment
</h1>


<div class="name">
Customer Name : Rahul
</div>


<div class="amount">
Amount : ₹999
</div>


<div class="qr">

<img id="qrImage" src="YOUR_QR_IMAGE.png">

</div>


<button class="download" onclick="downloadQR()">
Download QR
</button>


<button onclick="location.href='unlock.html'">
Payment Done
</button>


</div>



<script>

function downloadQR(){

let image=document.getElementById("qrImage").src;

let link=document.createElement("a");

link.href=image;

link.download="Payment_QR.png";

link.click();

}

</script>


</body>

</html>
