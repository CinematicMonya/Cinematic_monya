<!DOCTYPE html>
<html>
<head>

<title>Premium Cinematic Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.logo{
position:absolute;
top:25px;
left:50%;
transform:translateX(-50%);
font-size:40px;
font-weight:700;
color:#FFD700;
}

.box{
background:#111;
padding:60px;
border-radius:35px;
border:3px solid #FFD700;
max-width:800px;
width:95%;
text-align:center;
}

h1{
color:#FFD700;
font-size:50px;
margin-bottom:40px;
}

label{
font-size:32px;
display:block;
margin-top:30px;
font-weight:700;
color:#FFD700;
}

input{
width:100%;
height:75px;
padding:20px;
margin-top:15px;
border-radius:25px;
border:3px solid #FFD700;
background:#000;
color:white;
font-size:28px;
text-align:center;
outline:none;
}

input::placeholder{
color:#aaa;
font-size:24px;
}

.qr{
margin:35px auto;
width:320px;
height:320px;
background:white;
border-radius:20px;
border:3px solid #FFD700;
overflow:hidden;
}

.qr img{
width:100%;
height:100%;
object-fit:cover;
}

.download-btn{
display:inline-block;
margin-top:25px;
padding:18px 60px;
background:#00C853;
color:#000;
text-decoration:none;
font-size:26px;
font-weight:bold;
border-radius:50px;
}

.download-btn:hover{
background:#00A844;
}

.note{
font-size:22px;
line-height:1.8;
margin-top:30px;
}

.btn{
display:inline-block;
margin-top:35px;
padding:18px 60px;
background:#FF0000;
color:#000;
border:3px solid #FF0000;
border-radius:50px;
text-decoration:none;
font-size:26px;
font-weight:bold;
}

.btn:hover{
background:#CC0000;
}

</style>

</head>

<body>

<div class="logo">👑 Premium Cinematic</div>

<div class="box">

<h1>Payment</h1>

<label>Customer Name</label>
<input type="text" placeholder="Your Name">

<label>Amount</label>
<input type="text" placeholder="₹ 500">

<div class="qr">
<img src="IMG_4153.jpeg" alt="QR Code">
</div>

<a href="IMG_4153.jpeg" download class="download-btn">
📥 Download QR
</a>

<div class="note">
Payment झाल्यानंतर<br>
Screenshot WhatsApp वर पाठवा.
</div>

<a class="btn" href="unlock.html">
❤️ Payment Done
</a>

</div>

</body>
</html>
