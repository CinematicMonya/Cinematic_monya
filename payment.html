<!DOCTYPE html>
<html>
<head>
<title>Premium Cinematic Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.logo{
position:absolute;
top:25px;
left:50%;
transform:translateX(-50%);
font-size:36px;
font-weight:700;
color:#FFD700;
}

.box{
background:#111;
padding:45px;
border-radius:30px;
border:2px solid #FFD700;
max-width:650px;
width:95%;
text-align:center;
}

h1{
color:#FFD700;
font-size:40px;
margin-bottom:30px;
}

label{
font-size:24px;
display:block;
margin-top:20px;
}

input{
width:100%;
height:60px;
padding:15px;
margin-top:12px;
border-radius:20px;
border:2px solid #FFD700;
background:#000;
color:white;
font-size:22px;
text-align:center;
outline:none;
}

input::placeholder{
color:#aaa;
}

.qr{
margin:30px auto;
width:240px;
height:240px;
background:white;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
color:black;
font-size:20px;
border:3px solid #FFD700;
}

.note{
font-size:20px;
line-height:1.8;
margin-top:20px;
}

.btn{
display:inline-block;
margin-top:30px;
padding:16px 50px;
background:#222;
color:white;
border:2px solid #FFD700;
border-radius:50px;
text-decoration:none;
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="logo">👑 Premium Cinematic</div>

<div class="box">

<h1>Payment</h1>

<label>Customer Name</label>
<input type="text" placeholder="Enter Customer Name">

<label>Amount</label>
<input type="text" placeholder="₹ Enter Amount">


<div class="qr">
QR CODE
</div>


<div class="note">
Payment झाल्यानंतर<br>
Screenshot WhatsApp वर पाठवा.
</div>


<a class="btn" href="#">
Payment Done
</a>

</div>

</body>
</html>
