<!DOCTYPE html>
<html>
<head>
<title>Premium Cinematic Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.logo{
position:absolute;
top:25px;
left:50%;
transform:translateX(-50%);
font-size:36px;
font-weight:700;
color:#FFD700;
}

.box{
background:#111;
padding:40px;
border-radius:30px;
border:3px solid #FFD700;
max-width:600px;
width:95%;
text-align:center;
}

h1{
color:#FFD700;
font-size:38px;
margin-bottom:25px;
}

label{
font-size:22px;
display:block;
margin-top:15px;
}

input{
width:100%;
padding:15px;
margin-top:10px;
border-radius:15px;
border:none;
font-size:18px;
text-align:center;
}

.qr{
margin:25px auto;
width:220px;
height:220px;
background:white;
display:flex;
justify-content:center;
align-items:center;
color:black;
border-radius:20px;
}

.qr p{
font-size:18px;
}

.note{
font-size:18px;
line-height:1.7;
margin-top:20px;
}

.btn{
display:inline-block;
margin-top:25px;
padding:15px 45px;
background:#222;
color:white;
border:2px solid #FFD700;
border-radius:50px;
text-decoration:none;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="logo">👑 Premium Cinematic</div>

<div class="box">

<h1>Payment</h1>

<label>Customer Name</label>
<input type="text" placeholder="Enter Your Name">

<label>Amount</label>
<input type="text" placeholder="₹ Enter Amount">


<div class="qr">
<p>QR CODE</p>
</div>


<div class="note">
Payment झाल्यानंतर<br>
Screenshot WhatsApp वर पाठवा.
</div>


<a class="btn" href="#">
Payment Done
</a>


</div>

</body>
</html>
